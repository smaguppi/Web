<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- SEO -->
  <title>SMA GUPPI Salawati - Website Resmi Sekolah di Salawati Papua Barat</title>
  <meta name="description" content="Website resmi SMA GUPPI Salawati di Papua Barat yang menyediakan informasi profil sekolah, guru, kegiatan siswa, dan pengumuman terbaru.">
  <meta name="keywords" content="SMA GUPPI Salawati, sekolah di Salawati, SMA Papua Barat">
  <meta name="robots" content="index, follow">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0d47a1;
      color: white;
      text-align: center;
      padding: 12px;
    }

    header h1 {
      font-size: 18px;
    }

    /* SEO CONTENT */
    .seo-content {
      padding: 10px;
      font-size: 14px;
      line-height: 1.5;
      transition: all 0.7s ease;
    }

    .hidden {
      opacity: 0;
      height: 0;
      overflow: hidden;
    }

    /* LOADING */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 50vh;
      font-size: 16px;
      color: #0d47a1;
    }

    /* SPINNER */
    .spinner {
      border: 4px solid #ccc;
      border-top: 4px solid #0d47a1;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* IFRAME */
    iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: none;
    }
  </style>
</head>

<body>

  <header>
    <h1>SMA GUPPI Salawati</h1>
  </header>

  <!-- SEO CONTENT -->
  <div id="seoContent" class="seo-content">
    <h2>Tentang SMA GUPPI Salawati</h2>
    <p>
      SMA GUPPI Salawati adalah sekolah menengah atas di Papua Barat yang menyediakan informasi
      profil sekolah, guru, kegiatan siswa, dan pengumuman resmi.
    </p>
    <p><strong>Alamat:</strong> Salawati, Papua Barat, Indonesia</p>
  </div>

  <!-- LOADING -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    Memuat website...
  </div>

  <!-- IFRAME -->
  <iframe
    id="mainFrame"
    src="https://script.google.com/macros/s/AKfycbw8bC-ZfY_osjuScPMeYGk3w_EhF0j1f26VthVlZKO7Wk9Lzb1Sin19lL-qEYLCWGRC/exec"
    allow="fullscreen; camera; microphone; geolocation">
  </iframe>

  <!-- SCRIPT -->
  <script>
    const iframe = document.getElementById("mainFrame");
    const seoContent = document.getElementById("seoContent");
    const loading = document.getElementById("loading");

    iframe.onload = function () {
      // tampilkan iframe
      iframe.style.display = "block";

      // sembunyikan loading
      loading.style.display = "none";

      // sembunyikan SEO content
      seoContent.classList.add("hidden");
    };
  </script>

</body>
</html>
